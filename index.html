<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101418;
        --panel: #1b232b;
        --line: #2c3844;
        --text: #eef3f7;
        --muted: #9fb0bf;
        --accent: #4fd17f;
        --danger: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        padding: 16px;
        touch-action: manipulation;
      }

      main {
        width: min(100%, 460px);
        display: grid;
        gap: 14px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 0;
      }

      .score {
        color: var(--muted);
        font-weight: 700;
      }

      .board-wrap {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
      }

      canvas {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 6px;
        background: #0b1014;
        touch-action: none;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(74px, 1fr));
        grid-template-rows: repeat(3, 64px);
        gap: 10px;
        width: min(100%, 320px);
        justify-self: center;
      }

      .control {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #24303a;
        color: var(--text);
        font-size: 1.65rem;
        font-weight: 800;
        line-height: 1;
        min-height: 64px;
        touch-action: manipulation;
      }

      .control:active {
        background: #30404d;
        transform: translateY(1px);
      }

      .up {
        grid-column: 2;
        grid-row: 1;
      }

      .left {
        grid-column: 1;
        grid-row: 2;
      }

      .right {
        grid-column: 3;
        grid-row: 2;
      }

      .down {
        grid-column: 2;
        grid-row: 3;
      }

      .status {
        min-height: 1.4em;
        margin: 0;
        color: var(--muted);
        text-align: center;
      }

      .status strong {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Snake</h1>
        <div class="score" aria-live="polite">Score: <span id="score">0</span></div>
      </header>

      <div class="board-wrap">
        <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
      </div>

      <div class="controls" aria-label="Snake direction controls">
        <button class="control up" type="button" data-direction="up" aria-label="Move up">↑</button>
        <button class="control left" type="button" data-direction="left" aria-label="Move left">←</button>
        <button class="control right" type="button" data-direction="right" aria-label="Move right">→</button>
        <button class="control down" type="button" data-direction="down" aria-label="Move down">↓</button>
      </div>

      <p class="status" id="status">Swipe, tap controls, or use arrow keys.</p>
    </main>

    <script>
      const canvas = document.querySelector("#board");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.querySelector("#score");
      const statusEl = document.querySelector("#status");
      const gridSize = 20;
      const tileCount = canvas.width / gridSize;
      const directions = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 },
      };
      const keyDirections = {
        ArrowUp: "up",
        ArrowDown: "down",
        ArrowLeft: "left",
        ArrowRight: "right",
      };

      let snake;
      let food;
      let direction;
      let nextDirection;
      let score;
      let gameOver;
      let touchStartX = 0;
      let touchStartY = 0;

      function resetGame() {
        snake = [
          { x: 9, y: 10 },
          { x: 8, y: 10 },
          { x: 7, y: 10 },
        ];
        direction = directions.right;
        nextDirection = directions.right;
        score = 0;
        gameOver = false;
        scoreEl.textContent = score;
        statusEl.textContent = "Swipe, tap controls, or use arrow keys.";
        placeFood();
        draw();
      }

      function placeFood() {
        do {
          food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount),
          };
        } while (snake.some((part) => part.x === food.x && part.y === food.y));
      }

      function requestDirection(name) {
        const requested = directions[name];
        if (!requested) return;

        if (gameOver) resetGame();

        const isReverse = requested.x + direction.x === 0 && requested.y + direction.y === 0;
        if (isReverse) return;

        nextDirection = requested;
      }

      function update() {
        if (gameOver) return;

        direction = nextDirection;
        const head = snake[0];
        const nextHead = {
          x: head.x + direction.x,
          y: head.y + direction.y,
        };

        const hitWall =
          nextHead.x < 0 ||
          nextHead.x >= tileCount ||
          nextHead.y < 0 ||
          nextHead.y >= tileCount;
        const hitSelf = snake.some((part) => part.x === nextHead.x && part.y === nextHead.y);

        if (hitWall || hitSelf) {
          gameOver = true;
          statusEl.innerHTML = "<strong>Game over.</strong> Tap, swipe, or press an arrow to restart.";
          draw();
          return;
        }

        snake.unshift(nextHead);

        if (nextHead.x === food.x && nextHead.y === food.y) {
          score += 1;
          scoreEl.textContent = score;
          placeFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function draw() {
        ctx.fillStyle = "#0b1014";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffcf5a";
        ctx.fillRect(food.x * gridSize + 3, food.y * gridSize + 3, gridSize - 6, gridSize - 6);

        snake.forEach((part, index) => {
          ctx.fillStyle = index === 0 ? "#4fd17f" : "#2fae63";
          ctx.fillRect(part.x * gridSize + 2, part.y * gridSize + 2, gridSize - 4, gridSize - 4);
        });
      }

      document.querySelectorAll("[data-direction]").forEach((button) => {
        button.addEventListener("pointerdown", () => requestDirection(button.dataset.direction));
      });

      window.addEventListener("keydown", (event) => {
        const directionName = keyDirections[event.key];
        if (!directionName) return;

        event.preventDefault();
        requestDirection(directionName);
      });

      canvas.addEventListener("touchstart", (event) => {
        const touch = event.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      });

      canvas.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        const minSwipe = 24;

        if (Math.max(Math.abs(dx), Math.abs(dy)) < minSwipe) return;

        if (Math.abs(dx) > Math.abs(dy)) {
          requestDirection(dx > 0 ? "right" : "left");
        } else {
          requestDirection(dy > 0 ? "down" : "up");
        }
      });

      resetGame();
      setInterval(update, 130);
    </script>
  </body>
</html>
